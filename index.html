<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>team anony ubg</title>
    <style>
        body {
            background: #0b0b0b;
            color: #e5e5e5;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }

        header {
            border-bottom: 2px solid #222;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            color: #00ff66;
            margin: 0 0 10px 0;
            font-size: 28px;
            text-transform: uppercase;
        }

        .nav-bar {
            margin-bottom: 20px;
        }

        .nav-bar a {
            color: #aaa;
            text-decoration: none;
            margin-right: 15px;
            border: 1px solid #333;
            padding: 5px 10px;
            background: #111;
        }

        .nav-bar a:hover {
            color: #00ff66;
            border-color: #00ff66;
        }

        .iframe-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
        }

        .game-frame-box {
            background: #111;
            border: 2px solid #222;
            padding: 10px;
        }

        .game-frame-box:hover {
            border-color: #333;
        }

        .frame-title {
            color: #fff;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .grid-title {
            color: #888;
            font-size: 16px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .game-link {
            background: #111;
            border: 1px solid #222;
            padding: 15px 10px;
            text-align: center;
            text-decoration: none;
            color: #eee;
            font-size: 13px;
        }

        .game-link:hover {
            background: #00ff66;
            color: #000;
            border-color: #00ff66;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>team anonymoouzz unblocked games</h1>
        <p> ALL GAMES MADE BY US MORE COMING SOON <p>
        <div class="nav-bar">
            <a href="https://anonymoouzz.icu">anonyfarms</a>
        </div>
    </header>

    <div class="iframe-row">
        
        <div class="game-frame-box">
            <div class="frame-title">Smileblox</div>
            <iframe 
                src="smileblox.html" 
                width="640" 
                height="360" 
                scrolling="no" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="game-frame-box">
            <div class="frame-title">fart simulator</div>
            <iframe 
                src="fart.html" 
                width="640" 
                height="360" 
                scrolling="no" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>

    </div>

    <div class="grid-title">index</div>
    <div class="game-grid">
        <a href="smileblox.html" class="game-link">Smileblox</a>
        <a href="fart.html" class="game-link">fart simulator</a>
    </div>

</body>
</html>
